upstream dap_frontend {
    server 192.168.0.12:3001;
}

upstream dap_backend {
    server 192.168.0.12:3000;
}

server {
    access_log /var/log/nginx/access.log otel_json;
    error_log /var/log/nginx/error.log warn;
    listen 443 ssl http2;
    server_name dap.artisanhosting.net;

    include snippets/artisanhosting_cert.conf;
    include snippets/ssl-params.conf;

    location / {
        proxy_pass http://dap_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://dap_backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name dap.artisanhosting.net;
    return 301 https://$server_name$request_uri;
}

openapi: 3.0.3
info:
  title: Artisan Dynamic Auditing Platform Backend API
  version: 0.1.0
  description: |
    HTTP API for submitting audit runs, checking run status, and retrieving
    normalized results and canonical reports.
servers:
  - url: http://127.0.0.1:3000
    description: Local development server
tags:
  - name: Tests
  - name: Runs
  - name: Targets
paths:
  /v1/tests:
    get:
      tags:
        - Tests
      operationId: listSupportedTests
      summary: List supported tests
      description: Returns only tests that are runnable in the current deployment.
      responses:
        '200':
          description: Supported tests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupportedTestsResponse'
              examples:
                default:
                  value:
                    tests:
                      - id: dns_dmarc_policy
                        name: Email authentication posture
                        version: 0.2.0
                        runtime: python
                        timeout_seconds: 20
                        category: dns
  /v1/runs:
    post:
      tags:
        - Runs
      operationId: createRun
      summary: Submit a run
      description: |
        Accepts a new audit submission.

        If `requested_tests` is empty, the backend expands the request to all
        currently supported tests exposed by `GET /v1/tests`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRunRequest'
            examples:
              default:
                value:
                  target: artisanhosting.net
                  requested_tests:
                    - dns_dmarc_policy
                    - psi_web_performance
                  force_refresh: false
                  client_request_id: webapp-20260427-0001
      responses:
        '200':
          description: Request resolved immediately as a cache hit
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateRunResponse'
              examples:
                cacheHit:
                  value:
                    run_id: run_9a0fdde0c8d24c03b7c596ca9d92b1ea
                    state: cache_hit
                    target: artisanhosting.net
        '202':
          description: Run accepted and queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateRunResponse'
              examples:
                queued:
                  value:
                    run_id: run_9a0fdde0c8d24c03b7c596ca9d92b1ea
                    state: queued
                    target: artisanhosting.net
        '400':
          description: Invalid target or unsupported tests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidTarget:
                  value:
                    error: invalid_target
                    message: target must be a hostname or domain without scheme, port, path, or query
                unsupportedTests:
                  value:
                    error: unsupported_tests
                    unsupported_tests:
                      - future_magic_test
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          description: No supported tests are available in this deployment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                unavailable:
                  value:
                    error: no_supported_tests_available
                    message: the deployment does not currently expose any runnable tests
  /v1/runs/{run_id}:
    get:
      tags:
        - Runs
      operationId: getRunStatus
      summary: Get run status
      parameters:
        - $ref: '#/components/parameters/RunId'
      responses:
        '200':
          description: Run status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunStatusResponse'
              examples:
                default:
                  value:
                    run_id: run_9a0fdde0c8d24c03b7c596ca9d92b1ea
                    target: artisanhosting.net
                    state: running
                    submitted_at: '2026-04-27T14:00:00Z'
                    started_at: '2026-04-27T14:00:03Z'
                    completed_at: null
                    cache_hit: false
                    reused_from_run_id: null
                    requested_tests:
                      - test_id: dns_dmarc_policy
                        state: expanded_to_planned_tests
                    counts:
                      planned: 3
                      completed: 1
                      failed_to_start: 0
                      rejected_not_applicable: 0
        '404':
          $ref: '#/components/responses/RunNotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /v1/runs/{run_id}/results:
    get:
      tags:
        - Runs
      operationId: getRunResults
      summary: Get normalized run results
      parameters:
        - $ref: '#/components/parameters/RunId'
      responses:
        '200':
          description: Run results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunResultsResponse'
              examples:
                default:
                  value:
                    run_id: run_9a0fdde0c8d24c03b7c596ca9d92b1ea
                    requested_test_outcomes:
                      - test_id: psi_web_performance
                        state: rejected_not_applicable
                        reason: no applicable discovery facts satisfied this test's planner rules
                    results:
                      - result_id: res_92961678edec4fe9bd7ed98e63d79175
                        run_id: run_9a0fdde0c8d24c03b7c596ca9d92b1ea
                        target: artisanhosting.net
                        test_id: dns_dmarc_policy
                        plugin_version: 0.2.0
                        status: pass
                        severity: informational
                        notes: null
                        evidence:
                          dmarc_present: true
                          dmarc_policy: quarantine
                          spf_present: true
                        recommendations: []
                        artifacts: []
        '404':
          $ref: '#/components/responses/RunNotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /v1/runs/{run_id}/report:
    get:
      tags:
        - Runs
      operationId: getRunReport
      summary: Get canonical run report
      parameters:
        - $ref: '#/components/parameters/RunId'
      responses:
        '200':
          description: Canonical report JSON for the run
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CanonicalReportResponse'
        '404':
          $ref: '#/components/responses/RunNotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /v1/targets/{target}/latest:
    get:
      tags:
        - Targets
      operationId: getLatestTargetRun
      summary: Get latest completed run for a target
      parameters:
        - $ref: '#/components/parameters/Target'
      responses:
        '200':
          description: Latest completed or cache-hit run for the target
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TargetRunSummary'
        '400':
          description: Invalid target
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: No completed runs found for the target
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missing:
                  value:
                    error: run_not_found
                    message: no completed runs were found for this target
        '500':
          $ref: '#/components/responses/InternalError'
  /v1/targets/{target}/history:
    get:
      tags:
        - Targets
      operationId: getTargetHistory
      summary: Get run history for a target
      parameters:
        - $ref: '#/components/parameters/Target'
      responses:
        '200':
          description: Historical completed or cache-hit runs for the target, newest first
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TargetHistoryResponse'
              examples:
                default:
                  value:
                    target: artisanhosting.net
                    runs:
                      - run_id: run_9a0fdde0c8d24c03b7c596ca9d92b1ea
                        target: artisanhosting.net
                        state: completed
                        submitted_at: '2026-04-27T14:00:00Z'
                        completed_at: '2026-04-27T14:01:12Z'
                        cache_hit: false
        '400':
          description: Invalid target
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'
components:
  parameters:
    RunId:
      name: run_id
      in: path
      required: true
      description: Backend-generated run identifier.
      schema:
        type: string
        example: run_9a0fdde0c8d24c03b7c596ca9d92b1ea
    Target:
      name: target
      in: path
      required: true
      description: |
        Hostname or domain without scheme, port, path, query, or fragment.
        The backend normalizes this to lowercase internally.
      schema:
        type: string
        example: artisanhosting.net
  responses:
    RunNotFound:
      description: Run was not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            missing:
              value:
                error: run_not_found
                message: run was not found
    InternalError:
      description: Internal backend error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            default:
              value:
                error: internal_error
                message: failed to query storage
  schemas:
    RunState:
      type: string
      enum:
        - queued
        - cache_hit
        - discovering
        - planning
        - running
        - aggregating
        - completed
        - failed
        - canceled
    RequestedTestState:
      type: string
      enum:
        - accepted
        - rejected_unsupported
        - rejected_not_applicable
        - expanded_to_planned_tests
    TestStatus:
      type: string
      enum:
        - pass
        - warn
        - fail
        - error
        - info
        - skipped
    TestSeverity:
      type: string
      enum:
        - low
        - medium
        - high
        - critical
        - informational
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
        message:
          type: string
          nullable: true
        unsupported_tests:
          type: array
          nullable: true
          items:
            type: string
    SupportedTest:
      type: object
      required:
        - id
        - name
        - version
        - runtime
        - timeout_seconds
        - category
      properties:
        id:
          type: string
        name:
          type: string
        version:
          type: string
        runtime:
          type: string
        timeout_seconds:
          type: integer
          format: int64
          minimum: 0
        category:
          type: string
    SupportedTestsResponse:
      type: object
      required:
        - tests
      properties:
        tests:
          type: array
          items:
            $ref: '#/components/schemas/SupportedTest'
    CreateRunRequest:
      type: object
      required:
        - target
      properties:
        target:
          type: string
          description: Hostname or domain only.
        requested_tests:
          type: array
          description: Empty means all currently supported tests.
          items:
            type: string
          default: []
        force_refresh:
          type: boolean
          default: false
        client_request_id:
          type: string
          nullable: true
    CreateRunResponse:
      type: object
      required:
        - run_id
        - state
        - target
      properties:
        run_id:
          type: string
        state:
          $ref: '#/components/schemas/RunState'
        target:
          type: string
    RequestedTestStatus:
      type: object
      required:
        - test_id
        - state
      properties:
        test_id:
          type: string
        state:
          $ref: '#/components/schemas/RequestedTestState'
        reason:
          type: string
          nullable: true
    RunCounts:
      type: object
      required:
        - planned
        - completed
        - failed_to_start
        - rejected_not_applicable
      properties:
        planned:
          type: integer
          format: int64
          minimum: 0
        completed:
          type: integer
          format: int64
          minimum: 0
        failed_to_start:
          type: integer
          format: int64
          minimum: 0
        rejected_not_applicable:
          type: integer
          format: int64
          minimum: 0
    RunStatusResponse:
      type: object
      required:
        - run_id
        - target
        - state
        - submitted_at
        - cache_hit
        - requested_tests
        - counts
      properties:
        run_id:
          type: string
        target:
          type: string
        state:
          $ref: '#/components/schemas/RunState'
        submitted_at:
          type: string
          format: date-time
        started_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true
        cache_hit:
          type: boolean
        reused_from_run_id:
          type: string
          nullable: true
        requested_tests:
          type: array
          items:
            $ref: '#/components/schemas/RequestedTestStatus'
        counts:
          $ref: '#/components/schemas/RunCounts'
    Artifact:
      type: object
      required:
        - artifact_id
        - run_id
        - artifact_type
        - relative_path
        - content_type
        - size_bytes
      properties:
        artifact_id:
          type: string
        run_id:
          type: string
        result_id:
          type: string
          nullable: true
        artifact_type:
          type: string
        relative_path:
          type: string
        content_type:
          type: string
        size_bytes:
          type: integer
          format: int64
    PluginJsonValue:
      description: Arbitrary JSON value emitted by a plugin.
      nullable: true
    Result:
      type: object
      required:
        - result_id
        - run_id
        - target
        - test_id
        - plugin_version
        - status
        - severity
        - evidence
        - recommendations
      properties:
        result_id:
          type: string
        run_id:
          type: string
        target:
          type: string
        test_id:
          type: string
        plugin_version:
          type: string
        status:
          $ref: '#/components/schemas/TestStatus'
        severity:
          $ref: '#/components/schemas/TestSeverity'
        notes:
          type: string
          nullable: true
        evidence:
          $ref: '#/components/schemas/PluginJsonValue'
        recommendations:
          type: array
          items:
            type: string
        artifacts:
          type: array
          items:
            $ref: '#/components/schemas/Artifact'
    RunResultsResponse:
      type: object
      required:
        - run_id
        - requested_test_outcomes
        - results
      properties:
        run_id:
          type: string
        requested_test_outcomes:
          type: array
          items:
            $ref: '#/components/schemas/RequestedTestStatus'
        results:
          type: array
          items:
            $ref: '#/components/schemas/Result'
    TargetRunSummary:
      type: object
      required:
        - run_id
        - target
        - state
        - submitted_at
        - cache_hit
      properties:
        run_id:
          type: string
        target:
          type: string
        state:
          $ref: '#/components/schemas/RunState'
        submitted_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
          nullable: true
        cache_hit:
          type: boolean
    TargetHistoryResponse:
      type: object
      required:
        - target
        - runs
      properties:
        target:
          type: string
        runs:
          type: array
          items:
            $ref: '#/components/schemas/TargetRunSummary'
    ReportRun:
      type: object
      required:
        - run_id
        - target_input
        - target_key
        - state
        - submitted_at
        - cache_hit
        - force_refresh
        - engine_version
        - rules_version
        - config_hash
      properties:
        run_id:
          type: string
        target_input:
          type: string
        target_key:
          type: string
        state:
          $ref: '#/components/schemas/RunState'
        submitted_at:
          type: string
          format: date-time
        started_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true
        cache_hit:
          type: boolean
        reused_from_run_id:
          type: string
          nullable: true
        force_refresh:
          type: boolean
        client_request_id:
          type: string
          nullable: true
        engine_version:
          type: string
        rules_version:
          type: string
        config_hash:
          type: string
        error_message:
          type: string
          nullable: true
    ResultStatusCounts:
      type: object
      required:
        - pass
        - warn
        - fail
        - error
        - info
        - skipped
      properties:
        pass:
          type: integer
          format: int64
          minimum: 0
        warn:
          type: integer
          format: int64
          minimum: 0
        fail:
          type: integer
          format: int64
          minimum: 0
        error:
          type: integer
          format: int64
          minimum: 0
        info:
          type: integer
          format: int64
          minimum: 0
        skipped:
          type: integer
          format: int64
          minimum: 0
    ReportSummary:
      type: object
      required:
        - run_counts
        - result_counts
      properties:
        run_counts:
          $ref: '#/components/schemas/RunCounts'
        result_counts:
          $ref: '#/components/schemas/ResultStatusCounts'
    SiteProfile:
      type: object
      required:
        - host
        - kind
        - confidence
        - signals
      properties:
        host:
          type: string
        kind:
          type: string
        provider:
          type: string
          nullable: true
        confidence:
          type: number
          format: double
        signals:
          type: array
          items:
            type: string
    DeadHost:
      type: object
      required:
        - host
        - reason
        - source
      properties:
        host:
          type: string
        reason:
          type: string
        source:
          type: string
    ReviewBlock:
      type: object
      required:
        - finalized
      properties:
        finalized:
          type: boolean
        reviewer:
          type: string
          nullable: true
        reviewed_at:
          type: string
          format: date-time
          nullable: true
        notes:
          type: string
          nullable: true
    CanonicalReportResponse:
      type: object
      required:
        - schema_version
        - run
        - requested_tests
        - summary
        - site_profiles
        - dead_hosts
        - results
        - artifacts
        - review
      properties:
        schema_version:
          type: string
        run:
          $ref: '#/components/schemas/ReportRun'
        requested_tests:
          type: array
          items:
            $ref: '#/components/schemas/RequestedTestStatus'
        summary:
          $ref: '#/components/schemas/ReportSummary'
        site_profiles:
          type: array
          items:
            $ref: '#/components/schemas/SiteProfile'
        dead_hosts:
          type: array
          items:
            $ref: '#/components/schemas/DeadHost'
        results:
          type: array
          items:
            $ref: '#/components/schemas/Result'
        artifacts:
          type: array
          items:
            $ref: '#/components/schemas/Artifact'
        review:
          $ref: '#/components/schemas/ReviewBlock'
